name: 自動更新電力與天氣資料 (Auto Update)

# 設定觸發條件
on:
  schedule:
    # 這裡使用 Cron 語法，'0 * * * *' 代表每小時的第 0 分鐘執行一次
    # 注意：GitHub Actions 的時區是 UTC，但每小時執行一次不影響時區差異
    - cron: '0 * * * *'
  
  # 加入 workflow_dispatch 讓你可以隨時在 GitHub 網頁上手動點擊「Run workflow」測試
  workflow_dispatch:

# 設定權限，允許 Action 推送(push)程式碼回 Repo
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest # 使用最新的 Linux 環境

    steps:
      # 1. 檢出你的程式碼倉庫
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 可依據你本地端使用的版本調整

      # 3. 安裝所需的 Python 套件
      # 如果你的專案有 requirements.txt，可以改成 pip install -r requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy urllib3

      # 4. 執行更新腳本，並載入 Secrets 作為環境變數
      - name: Run update script
        env:
          JSON_SOURCE_URL: ${{ secrets.JSON_SOURCE_URL }}
          PANTRY_ID: ${{ secrets.PANTRY_ID }}
          PANTRY_BASKET: ${{ secrets.PANTRY_BASKET }}
          PANTRY_BASKET: "2026-q1"
          WEATHER_INDEX_URL: ${{ secrets.WEATHER_INDEX_URL }}
        run: python auto_update_all.py

      # 5. 將更新後的 CSV 與 Log 檔 Commit 並 Push 回 GitHub
      - name: Commit and Push changes
        run: |
          # 設定 Git 機器人身分
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 將有變動的檔案加入暫存區
          git add final_training_data_with_humidity.csv log.txt
          
          # 檢查是否有檔案變動，有變動才 Commit 與 Push，避免產生一堆空的 Commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自動更新：電力與天氣資料" && git push)
