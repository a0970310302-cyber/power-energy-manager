name: Offline AI Inference Runner

on:
  schedule:
    # 這裡設定每小時的第 0 分執行一次 (可依需求調整 cron 表達式)
    - cron: '0 * * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行

jobs:
  run-prediction:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run offline prediction
      run: |
        python auto_predict.py

    - name: Commit and push prediction cache
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add prediction_cache.csv
        # 檢查是否有變更，有變更才 commit
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update prediction_cache.csv" && git push)
